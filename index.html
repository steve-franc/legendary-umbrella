<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Visualization Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Archivo:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F0F0E;
    --paper:#FAFAF7;
    --paper-dim:#F1EFE8;
    --marker:#C9472B;
    --gold:#B89B5E;
    --grey:#8A8578;
    --line:#D8D4C8;
    --sheet-max: 1180px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header.app-head{ background:var(--paper); border-bottom:1px solid var(--line); padding:34px 28px 28px; }
  .head-inner{ max-width:var(--sheet-max); margin:0 auto; }
  .brand{ font-family:'Archivo Expanded',sans-serif; font-weight:800; font-size:15px; letter-spacing:.02em; text-transform:uppercase; margin-bottom:6px; }
  .brand span{ color:var(--marker); }
  .head-sub{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--grey); }

  main{ max-width:var(--sheet-max); margin:0 auto; padding:40px 28px 80px; }

  #status-msg{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--grey); }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:24px;
  }

  a.pcard{
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--paper);
    border:1px solid var(--line);
    transition:border-color .15s ease, transform .15s ease;
  }
  a.pcard:hover{ border-color:var(--ink); transform:translateY(-2px); }

  .pcard .thumb{
    aspect-ratio:4/3;
    background:repeating-linear-gradient(45deg, #ECE9E0, #ECE9E0 10px, #E4E0D3 10px, #E4E0D3 20px);
    display:flex; align-items:center; justify-content:center;
    color:var(--grey); font-family:'IBM Plex Mono',monospace; font-size:11px;
    overflow:hidden;
  }
  .pcard .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }

  .pcard .pbody{ padding:16px 18px; }
  .pcard .ptitle{ font-family:'Archivo',sans-serif; font-weight:600; font-size:15px; margin-bottom:4px; }
  .pcard .pmeta{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--grey); }

  @media (max-width:600px){
    header.app-head{ padding:24px 18px 20px; }
    main{ padding:28px 18px 60px; }
    .grid{ grid-template-columns:1fr; gap:18px; }
  }
</style>
</head>
<body>

<header class="app-head">
  <div class="head-inner">
    <div class="brand">STUDIO NAME <span>/</span> PORTFOLIO</div>
    <div class="head-sub">Client visualization projects — click a project to view the full presentation.</div>
  </div>
</header>

<main>
  <p id="status-msg">Loading projects…</p>
  <div class="grid" id="project-grid"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script>
  // ── CONFIG — same project as view.html / admin.html ──
  const SUPABASE_URL = 'https://rbflprjkiefomqoiobqd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiZmxwcmpraWVmb21xb2lvYnFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjEyNjIsImV4cCI6MjA5ODg5NzI2Mn0.X6VwEG8Xfd27JPdNVPFKngPVmIiWOPXxdZWzT-Bs4No';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Preferred order to look for a cover thumbnail among a project's uploaded images.
  const THUMB_PRIORITY = [
    'exterior-hero-render', 'interior-hero-render', 'main-exterior-hero',
    'front-elevation', 'living-main-space',
  ];

  function pickThumb(images) {
    if (!images) return null;
    for (const key of THUMB_PRIORITY) {
      if (images[key]) return images[key];
    }
    const values = Object.values(images);
    return values.length ? values[0] : null;
  }

  async function loadPortfolio() {
    const statusEl = document.getElementById('status-msg');
    const grid = document.getElementById('project-grid');

    const { data, error } = await sb
      .from('projects')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      statusEl.textContent = 'Could not load projects right now.';
      return;
    }
    if (!data || data.length === 0) {
      statusEl.textContent = 'No projects published yet.';
      return;
    }

    statusEl.remove();

    data.forEach(p => {
      const thumbUrl = pickThumb(p.images);
      const card = document.createElement('a');
      card.className = 'pcard';
      card.href = 'view.html?project=' + encodeURIComponent(p.slug);
      card.innerHTML = `
        <div class="thumb">${thumbUrl ? `<img src="${thumbUrl}" alt="${p.project_name}">` : 'NO PREVIEW YET'}</div>
        <div class="pbody">
          <div class="ptitle">${p.project_name}</div>
          <div class="pmeta">${p.client_name ? p.client_name + ' · ' : ''}${p.project_date || ''}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  loadPortfolio();
</script>

</body>
</html>
